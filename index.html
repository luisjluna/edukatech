<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Educativo Pro | Supabase</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Estilos base */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f4f7fa; color: #334155; padding: 1.5rem; }
        .container { max-width: 1400px; margin: 0 auto; }

        /* Dashboard y Cards */
        .dashboard-header { display: flex; justify-content: space-between; align-items: center; background: white; padding: 1rem 2rem; border-radius: 15px; margin-bottom: 2rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
        .tab-btn { padding: 0.6rem 1.2rem; border-radius: 10px; border: none; cursor: pointer; background: white; font-weight: 600; color: #64748b; transition: 0.3s; }
        .tab-btn.active { background: #2563eb; color: white; }
        .class-panel { background: white; border-radius: 20px; padding: 2rem; box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 1.5rem; margin-top: 1.5rem; }
        .card { border: 1px solid #e2e8f0; padding: 1.5rem; border-radius: 15px; background: #f8fafc; }

        /* Tablas */
        .table-wrap { overflow-x: auto; margin-top: 1rem; border-radius: 10px; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #f1f5f9; font-size: 0.9rem; }
        th { background: #f8fafc; color: #475569; }

        /* Inputs y Botones */
        input, select { padding: 8px 12px; border-radius: 8px; border: 1px solid #cbd5e1; margin-bottom: 10px; width: 100%; }
        .btn { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-blue { background: #2563eb; color: white; }
        .btn-red { background: #ef4444; color: white; padding: 5px 10px; font-size: 0.8rem; }

        /* Overlays */
        .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.8); display: none; justify-content: center; align-items: center; z-index: 9999; }
        .toast { position: fixed; bottom: 20px; right: 20px; padding: 12px 24px; border-radius: 10px; color: white; opacity: 0; transition: 0.3s; z-index: 10000; }
    </style>
</head>
<body>

<div id="loading" class="loading-overlay">Sincronizando...</div>
<div id="toast" class="toast"></div>
<div id="app"></div>

<script>
    const SUPABASE_URL = 'https://hofxrumwrvxylxikkcqf.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhvZnhydW13cnZ4eWx4aWtrY3FmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1NDQzNjAsImV4cCI6MjA5MjEyMDM2MH0.x1ep51ooqiBpw30H7ixpcM_UpphIeAszCZZRxzaCS-A';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const CLASS_KEYS = ['analisis', 'diseno', 'implementacion'];
    let db = {};
    let appState = { loggedIn: false, role: null, user: null };

    // CARGA DE DATOS
    async function init() {
        showLoading(true);
        const { data } = await supabase.from('app_data').select('content').eq('id', 1).single();
        if (data && Object.keys(data.content).length > 0) {
            db = data.content;
            // Asegurar que existan las llaves de seguridad
            if(!db.adminConfig) db.adminConfig = { user: 'admin', pass: 'admin' };
        } else {
            resetDB();
            await save();
        }
        showLoading(false);
        render();
    }

    function resetDB() {
        db = { adminConfig: { user: 'admin', pass: 'admin' }, classCodes: {}, assignments: {}, studentGrades: {}, students: {}, announcements: {}, uploads: {} };
        CLASS_KEYS.forEach(k => {
            db.classCodes[k] = k.toUpperCase()+'2025';
            db.assignments[k] = [{ id: Date.now(), name: 'Tarea Inicial' }];
            db.students[k] = [];
            db.studentGrades[k] = {};
            db.announcements[k] = [];
            db.uploads[k] = {};
        });
    }

    async function save() {
        showLoading(true);
        await supabase.from('app_data').update({ content: db }).eq('id', 1);
        showLoading(false);
        showToast("Cambios guardados en la nube");
    }

    // VISTAS
    function render() {
        const root = document.getElementById('app');
        if (!appState.loggedIn) return renderLogin(root);
        appState.role === 'docente' ? renderDocente(root) : renderEstudiante(root);
    }

    function renderLogin(root) {
        root.innerHTML = `
            <div style="display:flex; justify-content:center; align-items:center; height:80vh;">
                <div class="class-panel" style="width:100%; max-width:400px; text-align:center;">
                    <h2>Aula Virtual</h2><br>
                    <select id="loginRole"><option value="docente">Docente</option><option value="estudiante">Estudiante</option></select>
                    <div id="loginInputs"></div>
                    <button class="btn btn-blue" style="width:100%" onclick="login()">Entrar</button>
                </div>
            </div>
        `;
        const roleSel = document.getElementById('loginRole');
        const updateFields = () => {
            document.getElementById('loginInputs').innerHTML = roleSel.value === 'docente' ?
                `<input type="text" id="u" placeholder="Usuario"><input type="password" id="p" placeholder="Contraseña">` :
                `<select id="cSel">${CLASS_KEYS.map(k => `<option value="${k}">${k}</option>`).join('')}</select>
                 <input type="text" id="ced" placeholder="Cédula"><input type="text" id="cod" placeholder="Código Clase">`;
        };
        roleSel.onchange = updateFields; updateFields();
    }

    function login() {
        const role = document.getElementById('loginRole').value;
        if(role === 'docente') {
            if(document.getElementById('u').value === db.adminConfig.user && document.getElementById('p').value === db.adminConfig.pass) {
                appState = { loggedIn: true, role: 'docente' }; render();
            } else alert("Credenciales incorrectas");
        } else {
            const key = document.getElementById('cSel').value;
            const ced = document.getElementById('ced').value;
            const cod = document.getElementById('cod').value;
            const s = db.students[key].find(x => x.cedula === ced);
            if(s && cod === db.classCodes[key]) {
                appState = { loggedIn: true, role: 'estudiante', user: s, classKey: key }; render();
            } else alert("Datos inválidos");
        }
    }

    function renderDocente(root) {
        root.innerHTML = `
            <div class="container">
                <div class="dashboard-header">
                    <h2>Panel Administrador</h2>
                    <div>
                        <button class="btn" onclick="renderAdminSettings()">⚙️ Configuración</button>
                        <button class="btn btn-red" onclick="location.reload()">Salir</button>
                    </div>
                </div>
                <div class="tabs" id="tabs"></div>
                <div id="panelBody"></div>
            </div>
        `;
        CLASS_KEYS.forEach(k => {
            const b = document.createElement('button');
            b.className = 'tab-btn'; b.innerText = k.toUpperCase();
            b.onclick = () => { document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active')); b.classList.add('active'); renderClassManager(k); };
            document.getElementById('tabs').appendChild(b);
        });
        document.getElementById('tabs').firstChild.click();
    }

    function renderClassManager(key) {
        const body = document.getElementById('panelBody');
        body.innerHTML = `
            <div class="class-panel">
                <h3>Materia: ${key.toUpperCase()} | Código: ${db.classCodes[key]}</h3>
                <div class="grid">
                    <div class="card">
                        <h4>Estudiantes y Notas</h4>
                        <div class="table-wrap">
                            <table>
                                <thead><tr><th>Cédula</th><th>Nombre</th><th>Apellido</th>${db.assignments[key].map(a=>`<th>${a.name}</th>`).join('')}<th>Eliminar</th></tr></thead>
                                <tbody id="stBody"></tbody>
                            </table>
                        </div>
                        <br>
                        <button class="btn btn-blue" onclick="addStudent('${key}')">+ Estudiante</button>
                        <button class="btn btn-blue" onclick="addAssignment('${key}')">+ Tarea</button>
                    </div>
                    <div class="card">
                        <h4>📁 Entregas Recibidas</h4>
                        <div id="uploadList"></div>
                    </div>
                </div>
            </div>
        `;

        // Render Estudiantes
        db.students[key].forEach(s => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${s.cedula}</td><td>${s.nombre}</td><td>${s.apellido}</td>
                ${db.assignments[key].map(a => `<td><input type="number" style="width:50px" value="${db.studentGrades[key][s.cedula]?.[a.id] || ''}" onchange="updateNote('${key}','${s.cedula}','${a.id}', this.value)"></td>`).join('')}
                <td><button class="btn-red" onclick="delStudent('${key}','${s.cedula}')">X</button></td>`;
            document.getElementById('stBody').appendChild(tr);
        });

        // Render Entregas
        const upList = document.getElementById('uploadList');
        const tasks = db.uploads[key] || {};
        Object.keys(tasks).forEach(ced => {
            const s = db.students[key].find(x=>x.cedula === ced);
            upList.innerHTML += `<div class="card" style="margin-bottom:5px; background:white;">
                <strong>${s ? s.nombre+' '+s.apellido : ced}</strong><br>
                <small>${tasks[ced].filename} - ${tasks[ced].date}</small><br>
                <button class="btn btn-blue" style="font-size:0.7rem" onclick="download('${tasks[ced].data}', '${tasks[ced].filename}')">Descargar</button>
            </div>`;
        });
    }

    // FUNCIONES ADMIN
    async function updateNote(k, c, aid, v) { if(!db.studentGrades[k][c]) db.studentGrades[k][c]={}; db.studentGrades[k][c][aid]=v; await save(); }

    async function addStudent(k) {
        const ced = prompt("Cédula:"); if(!ced) return;
        const nom = prompt("Nombre:");
        const ape = prompt("Apellido:");
        db.students[k].push({cedula: ced, nombre: nom, apellido: ape});
        db.studentGrades[k][ced] = {};
        await save(); renderClassManager(k);
    }

    async function delStudent(k, ced) {
        if(confirm("¿Eliminar estudiante?")) {
            db.students[k] = db.students[k].filter(x => x.cedula !== ced);
            delete db.studentGrades[k][ced];
            delete db.uploads[k][ced];
            await save(); renderClassManager(k);
        }
    }

    async function addAssignment(k) {
        const n = prompt("Nombre de la tarea:");
        if(n) { db.assignments[k].push({id: Date.now(), name: n}); await save(); renderClassManager(k); }
    }

    function renderAdminSettings() {
        const body = document.getElementById('panelBody');
        body.innerHTML = `
            <div class="class-panel" style="max-width:500px">
                <h3>Cambiar Credenciales de Acceso</h3><br>
                <label>Nuevo Usuario:</label>
                <input type="text" id="newU" value="${db.adminConfig.user}">
                <label>Nueva Contraseña:</label>
                <input type="password" id="newP" value="${db.adminConfig.pass}">
                <button class="btn btn-blue" onclick="updateAdmin()">Actualizar Datos</button>
            </div>
        `;
    }

    async function updateAdmin() {
        db.adminConfig.user = document.getElementById('newU').value;
        db.adminConfig.pass = document.getElementById('newP').value;
        await save();
        alert("Credenciales actualizadas. Use los nuevos datos al volver a entrar.");
    }

    // VISTA ESTUDIANTE
    function renderEstudiante(root) {
        const k = appState.classKey; const s = appState.user;
        root.innerHTML = `
            <div class="container">
                <div class="dashboard-header"><h2>Hola, ${s.nombre}</h2><button class="btn btn-red" onclick="location.reload()">Salir</button></div>
                <div class="grid">
                    <div class="card">
                        <h3>Mis Notas</h3>
                        <table>
                            ${db.assignments[k].map(a=> `<tr><td>${a.name}</td><td>${db.studentGrades[k][s.cedula]?.[a.id] || 'N/A'}</td></tr>`).join('')}
                        </table>
                    </div>
                    <div class="card">
                        <h3>Enviar Tarea</h3>
                        <input type="file" id="fUp">
                        <button class="btn btn-blue" onclick="upload('${k}','${s.cedula}')">Subir Archivo</button>
                        <div id="status"></div>
                    </div>
                </div>
            </div>
        `;
    }

    async function upload(k, ced) {
        const file = document.getElementById('fUp').files[0];
        if(!file) return alert("Selecciona un archivo");
        const reader = new FileReader();
        reader.onload = async (e) => {
            db.uploads[k][ced] = { filename: file.name, data: e.target.result, date: new Date().toLocaleString() };
            await save();
            document.getElementById('status').innerHTML = "✅ Tarea enviada correctamente";
        };
        reader.readAsDataURL(file);
    }

    // UTILS
    function download(data, name) { const a = document.createElement('a'); a.href=data; a.download=name; a.click(); }
    function showLoading(s) { document.getElementById('loading').style.display = s ? 'flex' : 'none'; }
    function showToast(m) { const t=document.getElementById('toast'); t.innerText=m; t.style.background="#10b981"; t.style.opacity=1; setTimeout(()=>t.style.opacity=0, 2000); }

    init();
</script>
</body>
</html>
