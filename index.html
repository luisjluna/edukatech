<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Sistema de Gestión Educativa | Supabase Persistence</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>

    <style>
        /* [Tus estilos CSS originales se mantienen exactamente igual aquí] */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #eef2f8; color: #1e2a3e; padding: 1.5rem; min-height: 100vh; }
        .container { max-width: 1400px; margin: 0 auto; }
        .login-overlay { display: flex; justify-content: center; align-items: center; min-height: 80vh; }
        .login-card { background: white; border-radius: 2rem; padding: 2rem; width: 100%; max-width: 420px; box-shadow: 0 20px 35px rgba(0,0,0,0.1); text-align: center; }
        .login-card h2 { margin-bottom: 1.5rem; color: #1e4a76; }
        .login-card input, .login-card select { width: 100%; padding: 12px 16px; margin: 8px 0; border-radius: 60px; border: 1px solid #cbdde9; }
        .login-card button { width: 100%; background: #2c6e9e; color: white; border: none; padding: 12px; border-radius: 60px; font-weight: bold; margin-top: 1rem; cursor: pointer; }
        .dashboard-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 2rem; background: white; padding: 1rem 1.8rem; border-radius: 60px; box-shadow: 0 2px 8px rgba(0,0,0,0.03); }
        .user-info { display: flex; gap: 1rem; align-items: center; }
        .logout-btn { background: #eef2fa; border: none; padding: 8px 18px; border-radius: 40px; cursor: pointer; font-weight: 500; }
        .tabs { display: flex; gap: 0.8rem; flex-wrap: wrap; margin-bottom: 1.8rem; }
        .tab-btn { background: white; border: none; padding: 0.7rem 1.6rem; border-radius: 40px; font-weight: 600; cursor: pointer; }
        .tab-btn.active { background: #2c6e9e; color: white; }
        .class-panel { display: none; background: white; border-radius: 28px; padding: 1.5rem; margin-bottom: 2rem; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .class-panel.active-panel { display: block; }
        .section-title { font-size: 1.5rem; margin-bottom: 1rem; border-left: 5px solid #2c6e9e; padding-left: 1rem; }
        .grid-2col { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 1.8rem; margin-top: 1.2rem; }
        .card-module { background: #f9fbfd; border-radius: 24px; padding: 1.2rem; border: 1px solid #e2edf5; }
        .grades-table { width: 100%; border-collapse: collapse; overflow-x: auto; display: block; }
        .grades-table th, .grades-table td { border: 1px solid #dce5ec; padding: 8px 10px; text-align: center; font-size: 0.9rem; }
        .grades-table th { background: #eef2f8; }
        .grades-table input { width: 70px; padding: 4px; border-radius: 20px; border: 1px solid #cbdde9; text-align: center; }
        .material-item, .anuncio-item, .upload-item { background: white; padding: 0.8rem; border-radius: 20px; margin-bottom: 0.7rem; display: flex; justify-content: space-between; align-items: center; }
        button.small-btn { background: #eef2fa; border: none; padding: 6px 12px; border-radius: 30px; cursor: pointer; margin-top: 5px; }
        textarea, input[type="text"], input[type="number"], select { border-radius: 20px; border: 1px solid #cbdde9; padding: 8px 14px; width: 100%; }
        .toast-msg { position: fixed; bottom: 20px; right: 20px; background: #1e2a3e; color: white; padding: 10px 20px; border-radius: 60px; z-index: 1000; opacity: 0; transition: 0.2s; }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); display: none; justify-content: center; align-items: center; z-index: 2000; font-weight: bold; }
    </style>
</head>
<body>

<div id="loadingOverlay" class="loading-overlay">Sincronizando con la nube...</div>
<div id="app"></div>
<div id="toastMsg" class="toast-msg"></div>

<script>
    // 1. CONFIGURACIÓN SUPABASE
    const SUPABASE_URL = 'https://hofxrumwrvxylxikkcqf.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhvZnhydW13cnZ4eWx4aWtrY3FmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1NDQzNjAsImV4cCI6MjA5MjEyMDM2MH0.x1ep51ooqiBpw30H7ixpcM_UpphIeAszCZZRxzaCS-A';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // ---------- CONSTANTES ----------
    const CLASS_KEYS = ['analisis', 'diseno', 'implementacion'];
    const CLASS_NAMES = {
        analisis: '📊 Análisis de Sistemas',
        diseno: '🎨 Diseño de Sistemas',
        implementacion: '⚙️ Implementación de Sistemas'
    };

    // Estado global
    let appState = { loggedIn: false, role: null, studentClass: null, studentName: null, studentCedula: null };
    let db = {};

    // 2. FUNCIONES DE PERSISTENCIA (SUPABASE)
    async function loadDatabase() {
        showLoading(true);
        const { data, error } = await supabaseClient
            .from('app_data')
            .select('content')
            .eq('id', 1)
            .single();

        if (error || !data || Object.keys(data.content).length === 0) {
            console.warn("Base de datos vacía. Inicializando valores por defecto...");
            initDefaultDBStructure();
            await saveDatabase();
        } else {
            db = data.content;
        }
        showLoading(false);
        renderApp();
    }

    async function saveDatabase() {
        showLoading(true);
        const { error } = await supabaseClient
            .from('app_data')
            .update({ content: db, updated_at: new Date() })
            .eq('id', 1);

        if (error) {
            showToast('❌ Error al guardar en la nube');
            console.error(error);
        } else {
            showToast('✅ Cambios guardados');
        }
        showLoading(false);
    }

    function initDefaultDBStructure() {
        db = { classCodes: {}, assignments: {}, studentGrades: {}, materials: {}, announcements: {}, students: {}, studentUploads: {} };
        for (let key of CLASS_KEYS) {
            db.classCodes[key] = key.toUpperCase() + '2025';
            db.assignments[key] = [{ id: key+'1', name: 'Tarea Inicial' }];
            db.materials[key] = [];
            db.announcements[key] = [];
            db.students[key] = [];
            db.studentGrades[key] = {};
            db.studentUploads[key] = {};
        }
    }

    // 3. RENDERIZADO Y LÓGICA (Modificado para ser Async)
    function renderApp() {
        const appDiv = document.getElementById('app');
        if (!appState.loggedIn) renderLogin(appDiv);
        else if (appState.role === 'docente') renderDocenteDashboard(appDiv);
        else renderEstudianteDashboard(appDiv);
    }

    function renderLogin(container) {
        container.innerHTML = `
            <div class="login-overlay">
                <div class="login-card">
                    <i class="fas fa-graduation-cap" style="font-size: 3rem; color:#2c6e9e;"></i>
                    <h2>Acceso al Aula</h2>
                    <select id="roleSelect">
                        <option value="docente">👩‍🏫 Docente</option>
                        <option value="estudiante">👩‍🎓 Estudiante</option>
                    </select>
                    <div id="dynamicLoginFields"></div>
                    <button id="loginBtn">Ingresar</button>
                </div>
            </div>
        `;
        const roleSelect = document.getElementById('roleSelect');
        const dynamicDiv = document.getElementById('dynamicLoginFields');

        const updateFields = () => {
            if (roleSelect.value === 'docente') {
                dynamicDiv.innerHTML = `<input type="text" id="username" placeholder="Usuario"><input type="password" id="password" placeholder="Contraseña">`;
            } else {
                dynamicDiv.innerHTML = `
                    <select id="studentClassSelect">${CLASS_KEYS.map(k => `<option value="${k}">${CLASS_NAMES[k]}</option>`).join('')}</select>
                    <input type="text" id="cedula" placeholder="Número de cédula">
                    <input type="text" id="classCode" placeholder="Código de la materia">
                `;
            }
        };
        roleSelect.addEventListener('change', updateFields);
        updateFields();

        document.getElementById('loginBtn').onclick = () => {
            if (roleSelect.value === 'docente') {
                if (document.getElementById('username').value === 'admin' && document.getElementById('password').value === 'admin') {
                    appState = { loggedIn: true, role: 'docente', studentName: 'Administrador' };
                    renderApp();
                } else showToast('Credenciales incorrectas');
            } else {
                const selClass = document.getElementById('studentClassSelect').value;
                const ced = document.getElementById('cedula').value.trim();
                const cod = document.getElementById('classCode').value.trim();
                const student = (db.students[selClass] || []).find(s => s.cedula === ced);
                if (student && cod === db.classCodes[selClass]) {
                    appState = { loggedIn: true, role: 'estudiante', studentClass: selClass, studentName: student.nombre, studentCedula: ced };
                    renderApp();
                } else showToast('Datos incorrectos');
            }
        };
    }

    // --- DASHBOARD DOCENTE ---
    function renderDocenteDashboard(container) {
        container.innerHTML = `
            <div class="container">
                <div class="dashboard-header">
                    <h2>Panel Docente</h2>
                    <button onclick="location.reload()" class="logout-btn">Salir</button>
                </div>
                <div class="tabs" id="tabs"></div>
                <div id="panelContent"></div>
            </div>
        `;
        const tabs = document.getElementById('tabs');
        CLASS_KEYS.forEach(key => {
            const btn = document.createElement('button');
            btn.className = 'tab-btn';
            btn.innerText = CLASS_NAMES[key];
            btn.onclick = () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderClassManager(key);
            };
            tabs.appendChild(btn);
        });
        tabs.firstChild.click();
    }

    function renderClassManager(classKey) {
        const content = document.getElementById('panelContent');
        const students = db.students[classKey] || [];

        content.innerHTML = `
            <div class="class-panel active-panel">
                <div class="section-title">Gestión de Estudiantes - ${CLASS_NAMES[classKey]}</div>
                <div class="card-module">
                    <input type="text" id="newCed" placeholder="Cédula">
                    <input type="text" id="newNom" placeholder="Nombre">
                    <input type="text" id="newApe" placeholder="Apellido">
                    <button id="addStudentBtn" class="small-btn">Registrar Estudiante</button>
                </div>
                <div class="card-module">
                    <table class="grades-table">
                        <thead><tr><th>Cédula</th><th>Nombre</th><th>Acciones</th></tr></thead>
                        <tbody>
                            ${students.map(s => `<tr><td>${s.cedula}</td><td>${s.nombre} ${s.apellido}</td>
                            <td><button onclick="deleteStudent('${classKey}','${s.cedula}')">Eliminar</button></td></tr>`).join('')}
                        </tbody>
                    </table>
                </div>
            </div>
        `;

        document.getElementById('addStudentBtn').onclick = async () => {
            const cedula = document.getElementById('newCed').value;
            const nombre = document.getElementById('newNom').value;
            const apellido = document.getElementById('newApe').value;
            if(!cedula || !nombre) return showToast('Faltan datos');

            db.students[classKey].push({ cedula, nombre, apellido });
            db.studentGrades[classKey][cedula] = {};
            await saveDatabase();
            renderClassManager(classKey);
        };
    }

    async function deleteStudent(classKey, cedula) {
        if(!confirm('¿Eliminar?')) return;
        db.students[classKey] = db.students[classKey].filter(s => s.cedula !== cedula);
        delete db.studentGrades[classKey][cedula];
        await saveDatabase();
        renderClassManager(classKey);
    }

    // --- UTILIDADES ---
    function showToast(m) { const t=document.getElementById('toastMsg'); t.innerText=m; t.style.opacity=1; setTimeout(()=>t.style.opacity=0, 2000); }
    function showLoading(s) { document.getElementById('loadingOverlay').style.display = s ? 'flex' : 'none'; }

    // INICIO
    loadDatabase();
</script>
</body>
</html>
