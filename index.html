<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNEFA | Sistema de Gestión Académica Total</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #1e40af; --accent: #d97706; --bg: #f1f5f9; --danger: #be123c; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); margin: 0; color: #1e293b; }
        .container { max-width: 1500px; margin: 0 auto; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; background: #1e293b; color: white; padding: 15px 30px; position: sticky; top: 0; z-index: 100; }
        .table-wrap { overflow: auto; max-height: 50vh; border: 1px solid #e2e8f0; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th { background: #f8fafc; padding: 12px; position: sticky; top: 0; border-bottom: 2px solid #e2e8f0; z-index: 10; font-size: 0.8rem; }
        td { border-bottom: 1px solid #f1f5f9; padding: 10px; text-align: center; }
        .edit-input { border: none; background: transparent; text-align: center; width: 100%; font-size: 0.9rem; padding: 5px; }
        .edit-input:focus { background: #fffbeb; outline: 1px solid var(--accent); border-radius: 4px; }
        .btn { padding: 10px 18px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-accent { background: var(--accent); color: white; }
        .announcement { padding: 15px; border-left: 4px solid var(--primary); background: #f8fafc; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-radius: 0 8px 8px 0; }
        #status { position: fixed; bottom: 20px; right: 20px; padding: 12px 25px; border-radius: 50px; color: white; font-weight: bold; display: none; z-index: 9999; }
    </style>
</head>
<body>

<div id="status"></div>
<div id="app"></div>

<script>
    const SUPABASE_URL = 'https://hofxrumwrvxylxikkcqf.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhvZnhydW13cnZ4eWx4aWtrY3FmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1NDQzNjAsImV4cCI6MjA5MjEyMDM2MH0.x1ep51ooqiBpw30H7ixpcM_UpphIeAszCZZRxzaCS-A';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let db = null;
    let session = { role: null, user: null, class: 'analisis', search: '' };
    const TASKS = ["Parcial 1", "Parcial 2", "Proyecto", "Jornada"];

    async function init() {
        const { data } = await _supabase.from('app_data').select('content').eq('id', 1).maybeSingle();
        if (data) {
            db = data.content;
            if (!db.announcements) db.announcements = { analisis: [], diseno: [], implementacion: [] };
        } else {
            db = {
                admin: { user: 'admin', pass: 'admin123' },
                codes: { analisis: 'ANA2025', diseno: 'DIS2025', implementacion: 'IMP2025' },
                students: { analisis: [], diseno: [], implementacion: [] },
                grades: { analisis: {}, diseno: {}, implementacion: {} },
                uploads: { analisis: {}, diseno: {}, implementacion: {} },
                announcements: { analisis: [], diseno: [], implementacion: [] }
            };
            await save();
        }
        renderLogin();
    }

    async function save() {
        const s = document.getElementById('status');
        s.style.display = 'block'; s.style.background = '#0ea5e9'; s.innerText = '💾 Guardando...';
        await _supabase.from('app_data').upsert([{ id: 1, content: db }]);
        s.style.background = '#10b981'; s.innerText = '✅ Sincronizado';
        setTimeout(() => s.style.display = 'none', 1000);
    }

    function renderLogin() {
        document.getElementById('app').innerHTML = `
            <div style="height:100vh; display:flex; align-items:center; justify-content:center">
                <div class="card" style="width:350px; text-align:center">
                    <h2 style="color:var(--primary)">UNEFA SISTEMA</h2>
                    <select id="role" onchange="uiL()" style="width:100%; padding:10px; margin-bottom:15px">
                        <option value="student">Estudiante</option>
                        <option value="admin">Administrador</option>
                    </select>
                    <div id="lBox"></div>
                    <button class="btn btn-primary" onclick="doLogin()" style="width:100%; margin-top:10px">Ingresar</button>
                </div>
            </div>`;
        uiL();
    }

    function uiL() {
        const r = document.getElementById('role').value;
        const box = document.getElementById('lBox');
        box.innerHTML = r === 'admin' ?
            `<input type="text" id="u" placeholder="Usuario" style="width:93%; padding:10px; margin-bottom:10px">
             <input type="password" id="p" placeholder="Contraseña" style="width:93%; padding:10px">` :
            `<select id="c" style="width:100%; padding:10px; margin-bottom:10px">
                <option value="analisis">Análisis</option><option value="diseno">Diseño</option><option value="implementacion">Implementación</option>
             </select>
             <input type="text" id="ced" placeholder="Cédula" style="width:93%; padding:10px; margin-bottom:10px">
             <input type="text" id="cod" placeholder="Código Clase" style="width:93%; padding:10px">`;
    }

    function doLogin() {
        const r = document.getElementById('role').value;
        if(r === 'admin') {
            if(document.getElementById('u').value === db.admin.user && document.getElementById('p').value === db.admin.pass) {
                session.role = 'admin'; renderAdmin();
            } else alert("Error de Admin");
        } else {
            const c = document.getElementById('c').value, ced = document.getElementById('ced').value.trim(), cod = document.getElementById('cod').value.trim();
            const s = db.students[c].find(x => x.cedula === ced);
            if(s && cod === db.codes[c]) {
                session.role = 'student'; session.user = s; session.class = c; renderStudent();
            } else alert("Acceso denegado");
        }
    }

    // --- PANEL ADMIN ---
    function renderAdmin() {
        const c = session.class;
        const filtered = db.students[c].filter(s => s.nombre.toLowerCase().includes(session.search.toLowerCase()) || s.cedula.includes(session.search));

        document.getElementById('app').innerHTML = `
            <div class="header">
                <div><b>PANEL ADMINISTRADOR</b></div>
                <div style="display:flex; gap:10px">
                    <button class="btn btn-accent" onclick="changeAdmin()">⚙️ Cambiar Clave</button>
                    <button class="btn btn-danger" onclick="location.reload()">Salir</button>
                </div>
            </div>
            <div class="container">
                <div class="card">
                    <h3>📢 Tablón de Anuncios - Sección ${c.toUpperCase()}</h3>
                    <div style="display:flex; gap:10px; margin-bottom:20px">
                        <input type="text" id="annTitle" placeholder="Título" style="flex:1; padding:8px">
                        <input type="text" id="annMsg" placeholder="Mensaje..." style="flex:2; padding:8px">
                        <button class="btn btn-primary" onclick="addAnn('${c}')">Publicar</button>
                    </div>
                    <div id="annList">
                        ${db.announcements[c].map((a, idx) => `
                            <div class="announcement">
                                <div><b>${a.t}</b>: ${a.m} <br><small>${a.d}</small></div>
                                <button class="btn-danger" style="padding:5px" onclick="delAnn('${c}', ${idx})">Eliminar</button>
                            </div>
                        `).reverse().join('')}
                    </div>
                </div>

                <div class="card" style="display:flex; gap:10px; align-items:center; flex-wrap:wrap">
                    <b>Sección:</b>
                    <select onchange="session.class=this.value; renderAdmin()">
                        <option value="analisis" ${c==='analisis'?'selected':''}>Análisis</option>
                        <option value="diseno" ${c==='diseno'?'selected':''}>Diseño</option>
                        <option value="implementacion" ${c==='implementacion'?'selected':''}>Implementación</option>
                    </select>
                    <input type="text" placeholder="Buscar..." style="flex-grow:1; padding:8px" oninput="session.search=this.value; renderAdmin()">
                    <button class="btn btn-primary" onclick="exportX('${c}')">Exportar Excel</button>
                    <button class="btn btn-danger" onclick="clearClass('${c}')">Eliminar Todo</button>
                </div>

                <div class="card">
                    <h3>Gestión de Estudiantes y Notas</h3>
                    <div class="table-wrap">
                        <table>
                            <thead>
                                <tr><th>Cédula</th><th>Nombre</th><th>Apellido</th>${TASKS.map(t=>`<th>${t}</th>`).join('')}<th>Eliminar</th></tr>
                            </thead>
                            <tbody>
                                ${filtered.map(s => `
                                    <tr>
                                        <td><b>${s.cedula}</b></td>
                                        <td><input class="edit-input" value="${s.nombre}" onchange="editS('${c}','${s.cedula}','nombre',this.value)"></td>
                                        <td><input class="edit-input" value="${s.apellido}" onchange="editS('${c}','${s.cedula}','apellido',this.value)"></td>
                                        ${TASKS.map(t => `
                                            <td><input type="number" class="edit-input" style="width:50px" value="${db.grades[c][s.cedula]?.[t] || ''}"
                                                onchange="editG('${c}','${s.cedula}','${t}',this.value)"></td>
                                        `).join('')}
                                        <td><button class="btn-danger" onclick="delS('${c}','${s.cedula}')">Borrar</button></td>
                                    </tr>`).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="card">
                    <h3>📂 Control de Entregas Recibidas</h3>
                    <div class="table-wrap">
                        <table>
                            <thead><tr><th>Cédula</th><th>Estudiante</th><th>Archivo</th><th>Fecha</th></tr></thead>
                            <tbody>
                                ${Object.keys(db.uploads[c]).map(ced => {
                                    const st = db.students[c].find(x => x.cedula === ced) || {nombre:'?', apellido:'?'};
                                    return db.uploads[c][ced].map(u => `
                                        <tr>
                                            <td>${ced}</td>
                                            <td>${st.nombre} ${st.apellido}</td>
                                            <td><a href="${u.data}" download="${u.name}">${u.name}</a></td>
                                            <td>${u.date}</td>
                                        </tr>
                                    `).join('');
                                }).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>`;
    }

    // --- FUNCIONES LOGICA ---
    async function addAnn(c) {
        const t = document.getElementById('annTitle').value, m = document.getElementById('annMsg').value;
        if(t && m) {
            db.announcements[c].push({t, m, d: new Date().toLocaleString()});
            await save(); renderAdmin();
        }
    }

    async function delAnn(c, idx) {
        db.announcements[c].splice(idx, 1);
        await save(); renderAdmin();
    }

    async function editS(c, ced, campo, val) {
        let s = db.students[c].find(x => x.cedula === ced);
        if(s) s[campo] = val;
        await save();
    }

    async function editG(c, ced, t, val) {
        if(!db.grades[c][ced]) db.grades[c][ced] = {};
        db.grades[c][ced][t] = val;
        await save();
    }

    async function delS(c, ced) {
        if(confirm("¿Borrar estudiante, notas y archivos?")) {
            db.students[c] = db.students[c].filter(x => x.cedula !== ced);
            delete db.grades[c][ced];
            delete db.uploads[c][ced];
            await save(); renderAdmin();
        }
    }

    async function clearClass(c) {
        if(confirm("¿VACIAR SECCIÓN COMPLETA?")) {
            db.students[c] = []; db.grades[c] = {}; db.uploads[c] = {}; db.announcements[c] = [];
            await save(); renderAdmin();
        }
    }

    function changeAdmin() {
        const u = prompt("Nuevo Usuario:", db.admin.user);
        const p = prompt("Nueva Clave:", db.admin.pass);
        if(u && p) { db.admin = {user:u, pass:p}; save(); alert("Acceso actualizado"); }
    }

    function exportX(c) {
        const data = db.students[c].map(s => {
            let r = { "CI": s.cedula, "Nombre": s.nombre, "Apellido": s.apellido };
            TASKS.forEach(t => r[t] = db.grades[c][s.cedula]?.[t] || 0);
            return r;
        });
        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Reporte");
        XLSX.writeFile(wb, `Seccion_${c}.xlsx`);
    }

    // --- PANEL ESTUDIANTE ---
    function renderStudent() {
        const { user: s, class: c } = session;
        document.getElementById('app').innerHTML = `
            <div class="header"><div>${s.nombre} ${s.apellido}</div><button class="btn btn-danger" onclick="location.reload()">Cerrar</button></div>
            <div class="container" style="max-width:800px">
                <div class="card">
                    <h3>📢 Tablón de la Clase</h3>
                    ${db.announcements[c].length ? db.announcements[c].map(a => `
                        <div style="padding:10px; border-bottom:1px solid #eee"><b>${a.t}</b>: ${a.m} <br><small>${a.d}</small></div>
                    `).reverse().join('') : 'No hay avisos.'}
                </div>
                <div class="card">
                    <h3>Mis Notas</h3>
                    <table style="width:100%">
                        ${TASKS.map(t => `<tr style="border-bottom:1px solid #eee"><td style="padding:10px">${t}</td><td><b>${db.grades[c][s.cedula]?.[t] || 'S/N'}</b></td></tr>`).join('')}
                    </table>
                </div>
                <div class="card">
                    <h3>Enviar Tarea</h3>
                    <input type="file" id="f"><br><br>
                    <button class="btn btn-primary" onclick="upFile()">Subir Archivo</button>
                </div>
            </div>`;
    }

    async function upFile() {
        const f = document.getElementById('f').files[0];
        if(!f) return alert("Selecciona archivo");
        const r = new FileReader();
        r.onload = async (e) => {
            if(!db.uploads[session.class][session.user.cedula]) db.uploads[session.class][session.user.cedula] = [];
            db.uploads[session.class][session.user.cedula].push({ name: f.name, data: e.target.result, date: new Date().toLocaleString() });
            await save(); alert("Enviado");
        };
        r.readAsDataURL(f);
    }

    init();
</script>
</body>
</html>
