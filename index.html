<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Educativo PRO | +200 Estudiantes</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #2c6e9e; --danger: #dc3545; --bg: #eef2f8; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #1e2a3e; padding: 1rem; }

        .container { max-width: 1400px; margin: 0 auto; }

        /* Tablas optimizadas para muchos datos */
        .table-wrapper {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 2rem;
            max-height: 500px; /* Scroll interno para no alargar la página */
            overflow-y: auto;
        }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: #f8fafc; position: sticky; top: 0; z-index: 10; padding: 12px; border-bottom: 2px solid #edf2f7; }
        td { padding: 12px; border-bottom: 1px solid #edf2f7; font-size: 0.9rem; }

        /* UI Elements */
        .btn { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-danger { background: #fee2e2; color: var(--danger); }
        .btn-sm { padding: 4px 8px; font-size: 0.75rem; }

        .card { background: white; padding: 1.5rem; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 1.5rem; }

        /* Login */
        .login-screen { height: 90vh; display: flex; align-items: center; justify-content: center; }
        .login-box { width: 100%; max-width: 400px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #cbd5e1; border-radius: 8px; }

        .status-badge { padding: 2px 8px; border-radius: 10px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; }
        .bg-success { background: #c6f6d5; color: #22543d; }
    </style>
</head>
<body>

<div id="app"></div>

<script>
    // CONFIGURACIÓN (Mantener tus credenciales actuales)
    const SUPABASE_URL = 'https://hofxrumwrvxylxikkcqf.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhvZnhydW13cnZ4eWx4aWtrY3FmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1NDQzNjAsImV4cCI6MjA5MjEyMDM2MH0.x1ep51ooqiBpw30H7ixpcM_UpphIeAszCZZRxzaCS-A';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let db = {};
    let session = { role: null, user: null, class: null };

    // CARGA INICIAL
    async function init() {
        const { data, error } = await supabase.from('app_data').select('content').eq('id', 1).single();
        if (data) {
            db = data.content;
            renderLogin();
        }
    }

    async function sync() {
        await supabase.from('app_data').update({ content: db }).eq('id', 1);
    }

    // --- VISTAS ---
    function renderLogin() {
        document.getElementById('app').innerHTML = `
            <div class="login-screen">
                <div class="card login-box">
                    <h2 style="text-align:center; margin-bottom:1rem;">Aula Virtual</h2>
                    <select id="role">
                        <option value="admin">Administrador / Docente</option>
                        <option value="student">Estudiante</option>
                    </select>
                    <div id="login-fields">
                        <input type="text" id="u" placeholder="Usuario (admin)">
                        <input type="password" id="p" placeholder="Contraseña">
                    </div>
                    <button class="btn btn-primary" style="width:100%" onclick="login()">Ingresar</button>
                </div>
            </div>
        `;
        document.getElementById('role').onchange = (e) => {
            const f = document.getElementById('login-fields');
            if(e.target.value === 'admin') {
                f.innerHTML = `<input type="text" id="u" placeholder="Usuario"><input type="password" id="p" placeholder="Contraseña">`;
            } else {
                f.innerHTML = `
                    <select id="c">${Object.keys(db.classCodes).map(k => `<option value="${k}">${k.toUpperCase()}</option>`).join('')}</select>
                    <input type="text" id="ced" placeholder="Cédula">
                    <input type="password" id="cod" placeholder="Código de Clase">
                `;
            }
        };
    }

    function login() {
        const role = document.getElementById('role').value;
        if(role === 'admin') {
            const u = document.getElementById('u').value;
            const p = document.getElementById('p').value;
            if(u === db.adminAuth.user && p === db.adminAuth.pass) {
                session = { role: 'admin' }; renderAdmin();
            } else alert("Error");
        } else {
            const c = document.getElementById('c').value;
            const ced = document.getElementById('ced').value;
            const cod = document.getElementById('cod').value;
            const student = db.students[c].find(s => s.cedula === ced);
            if(student && cod === db.classCodes[c]) {
                session = { role: 'student', user: student, class: c };
                renderStudent();
            } else alert("Datos incorrectos");
        }
    }

    // --- PANEL ADMINISTRADOR ---
    function renderAdmin() {
        document.getElementById('app').innerHTML = `
            <div class="container">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:2rem;">
                    <h1>Panel Docente</h1>
                    <div>
                        <button class="btn btn-primary" onclick="changeAdminPass()">🔑 Cambiar Clave</button>
                        <button class="btn btn-danger" onclick="location.reload()">Salir</button>
                    </div>
                </div>

                <div class="grid">
                    <!-- SECCIÓN ESTUDIANTES -->
                    <div class="card">
                        <h3>👥 Gestión de Estudiantes (${getTotalStudents()} alumnos)</h3>
                        <select id="classFilter" onchange="renderAdminTables()">
                            ${Object.keys(db.students).map(k => `<option value="${k}">${k.toUpperCase()}</option>`).join('')}
                        </select>
                        <div class="table-wrapper">
                            <table id="studentTable"></table>
                        </div>
                        <button class="btn btn-primary btn-sm" onclick="addStudent()">+ Nuevo Estudiante</button>
                    </div>

                    <!-- SECCIÓN TAREAS -->
                    <div class="card">
                        <h3>📝 Tareas Asignadas</h3>
                        <div class="table-wrapper">
                            <table id="taskTable"></table>
                        </div>
                        <button class="btn btn-primary btn-sm" onclick="addTask()">+ Nueva Tarea</button>
                    </div>
                </div>

                <!-- SECCIÓN ENTREGAS -->
                <div class="card" style="margin-top:2rem;">
                    <h3>📥 Registro Global de Entregas</h3>
                    <div class="table-wrapper" style="max-height:400px;">
                        <table id="deliveryTable">
                            <thead><tr><th>Estudiante</th><th>Cédula</th><th>Materia</th><th>Archivo</th><th>Fecha</th></tr></thead>
                            <tbody id="deliveryBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        `;
        renderAdminTables();
    }

    function renderAdminTables() {
        const c = document.getElementById('classFilter').value;

        // Tabla Estudiantes
        const sTable = document.getElementById('studentTable');
        sTable.innerHTML = `<thead><tr><th>Cédula</th><th>Nombre</th><th>Apellido</th><th>Acción</th></tr></thead>
            <tbody>${db.students[c].map(s => `
                <tr>
                    <td>${s.cedula}</td>
                    <td>${s.nombre}</td>
                    <td>${s.apellido}</td>
                    <td><button class="btn btn-danger btn-sm" onclick="delStudent('${c}','${s.cedula}')"><i class="fas fa-trash"></i></button></td>
                </tr>`).join('')}
            </tbody>`;

        // Tabla Tareas
        const tTable = document.getElementById('taskTable');
        tTable.innerHTML = `<thead><tr><th>Nombre de Tarea</th><th>Acciones</th></tr></thead>
            <tbody>${db.assignments[c].map(t => `
                <tr>
                    <td>${t.name}</td>
                    <td>
                        <button class="btn btn-primary btn-sm" onclick="editTask('${c}', ${t.id})">✎</button>
                        <button class="btn btn-danger btn-sm" onclick="delTask('${c}', ${t.id})">✖</button>
                    </td>
                </tr>`).join('')}
            </tbody>`;

        // Tabla Entregas
        const dBody = document.getElementById('deliveryBody');
        dBody.innerHTML = '';
        Object.keys(db.studentUploads).forEach(cls => {
            Object.keys(db.studentUploads[cls]).forEach(ced => {
                const student = db.students[cls].find(s => s.cedula === ced);
                db.studentUploads[cls][ced].forEach(up => {
                    dBody.innerHTML += `<tr>
                        <td>${student ? student.nombre + ' ' + student.apellido : 'Removido'}</td>
                        <td>${ced}</td>
                        <td>${cls.toUpperCase()}</td>
                        <td><a href="${up.content}" download="${up.filename}">${up.filename}</a></td>
                        <td>${up.date}</td>
                    </tr>`;
                });
            });
        });
    }

    // --- LÓGICA DE NEGOCIO ---
    async function changeAdminPass() {
        const p = prompt("Nueva contraseña para 'admin':");
        if(p) { db.adminAuth.pass = p; await sync(); alert("Contraseña actualizada"); }
    }

    async function addStudent() {
        const c = document.getElementById('classFilter').value;
        const ced = prompt("Cédula:");
        const nom = prompt("Nombre:");
        const ape = prompt("Apellido:");
        if(ced && nom) {
            db.students[c].push({ cedula: ced, nombre: nom, apellido: ape });
            await sync(); renderAdminTables();
        }
    }

    async function delStudent(c, ced) {
        if(confirm("¿Eliminar estudiante y sus registros?")) {
            db.students[c] = db.students[c].filter(s => s.cedula !== ced);
            delete db.studentUploads[c][ced];
            await sync(); renderAdminTables();
        }
    }

    async function addTask() {
        const c = document.getElementById('classFilter').value;
        const n = prompt("Nombre de la tarea:");
        if(n) {
            db.assignments[c].push({ id: Date.now(), name: n });
            await sync(); renderAdminTables();
        }
    }

    async function editTask(c, id) {
        const task = db.assignments[c].find(t => t.id === id);
        const n = prompt("Nuevo nombre:", task.name);
        if(n) { task.name = n; await sync(); renderAdminTables(); }
    }

    async function delTask(c, id) {
        if(confirm("¿Eliminar tarea permanentemente?")) {
            db.assignments[c] = db.assignments[c].filter(t => t.id !== id);
            await sync(); renderAdminTables();
        }
    }

    // --- PANEL ESTUDIANTE ---
    function renderStudent() {
        const s = session.user;
        const c = session.class;
        document.getElementById('app').innerHTML = `
            <div class="container">
                <div class="card" style="margin-bottom:2rem; display:flex; justify-content:space-between; align-items:center;">
                    <div>
                        <h2>Bienvenido, ${s.nombre} ${s.apellido}</h2>
                        <p>Cédula: ${s.cedula} | Clase: ${c.toUpperCase()}</p>
                    </div>
                    <button class="btn btn-danger" onclick="location.reload()">Cerrar Sesión</button>
                </div>

                <div class="grid">
                    <div class="card">
                        <h3>📤 Realizar Entrega</h3>
                        <label>Selecciona Tarea:</label>
                        <select id="taskSel">
                            ${db.assignments[c].map(t => `<option value="${t.name}">${t.name}</option>`).join('')}
                        </select>
                        <input type="file" id="fileIn">
                        <button class="btn btn-primary" style="width:100%" onclick="uploadFile()">Enviar Archivo</button>
                    </div>

                    <div class="card">
                        <h3>📋 Mis Entregas</h3>
                        <div class="table-wrapper">
                            <table>
                                <thead><tr><th>Tarea</th><th>Archivo</th><th>Fecha</th></tr></thead>
                                <tbody>
                                    ${(db.studentUploads[c][s.cedula] || []).map(up => `
                                        <tr><td>${up.taskName}</td><td>${up.filename}</td><td>${up.date}</td></tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        `;
    }

    async function uploadFile() {
        const file = document.getElementById('fileIn').files[0];
        const task = document.getElementById('taskSel').value;
        if(!file) return alert("Selecciona un archivo");

        const reader = new FileReader();
        reader.onload = async (e) => {
            if(!db.studentUploads[session.class][session.user.cedula])
                db.studentUploads[session.class][session.user.cedula] = [];

            db.studentUploads[session.class][session.user.cedula].push({
                taskName: task,
                filename: file.name,
                content: e.target.result,
                date: new Date().toLocaleString()
            });
            await sync();
            alert("Tarea entregada con éxito");
            renderStudent();
        };
        reader.readAsDataURL(file);
    }

    function getTotalStudents() {
        return Object.values(db.students).reduce((acc, curr) => acc + curr.length, 0);
    }

    init();
</script>
</body>
</html>
