<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Académico | UNEFA Maracay</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #1e40af; --accent: #d97706; --bg: #f1f5f9; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); margin: 0; color: #1e293b; }
        .container { max-width: 1500px; margin: 0 auto; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; background: #1e293b; color: white; padding: 15px 30px; }

        /* Tablas */
        .table-wrap { overflow: auto; max-height: 65vh; border: 1px solid #e2e8f0; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th { background: #f8fafc; padding: 12px; position: sticky; top: 0; border-bottom: 2px solid #e2e8f0; }
        td { border-bottom: 1px solid #f1f5f9; padding: 8px; text-align: center; }

        /* Inputs */
        input[type="text"], input[type="number"], select { padding: 8px; border: 1px solid #cbd5e1; border-radius: 4px; }
        .edit-input { border: none; background: transparent; text-align: center; width: 100%; font-size: 0.9rem; }
        .edit-input:focus { background: #fffbeb; outline: 1px solid var(--accent); }

        .btn { padding: 10px 18px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-accent { background: var(--accent); color: white; }
        .btn-danger { background: #be123c; color: white; }

        #status { position: fixed; bottom: 20px; right: 20px; padding: 12px 25px; border-radius: 50px; color: white; font-weight: bold; display: none; z-index: 9999; }
    </style>
</head>
<body>

<div id="status"></div>
<div id="app"></div>

<script>
    const SUPABASE_URL = 'https://hofxrumwrvxylxikkcqf.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhvZnhydW13cnZ4eWx4aWtrY3FmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1NDQzNjAsImV4cCI6MjA5MjEyMDM2MH0.x1ep51ooqiBpw30H7ixpcM_UpphIeAszCZZRxzaCS-A';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let db = null;
    let session = { role: null, user: null, class: 'analisis', search: '' };
    const TASKS = ["Parcial 1", "Parcial 2", "Proyecto", "Jornada"];

    async function init() {
        const { data, error } = await _supabase.from('app_data').select('content').eq('id', 1).maybeSingle();
        if (data) {
            db = data.content;
            // Migración: Asegurar que existan las nuevas carpetas
            if (!db.uploads) db.uploads = { analisis: {}, diseno: {}, implementacion: {} };
        } else {
            db = {
                admin: { user: 'admin', pass: 'admin123' },
                codes: { analisis: 'ANA2025', diseno: 'DIS2025', implementacion: 'IMP2025' },
                students: { analisis: [], diseno: [], implementacion: [] },
                grades: { analisis: {}, diseno: {}, implementacion: {} },
                announcements: { analisis: [], diseno: [], implementacion: [] },
                uploads: { analisis: {}, diseno: {}, implementacion: {} }
            };
            await _supabase.from('app_data').upsert([{ id: 1, content: db }]);
        }
        renderLogin();
    }

    async function save() {
        const s = document.getElementById('status');
        s.style.display = 'block'; s.style.background = '#0ea5e9'; s.innerText = '💾 Guardando en Supabase...';
        const { error } = await _supabase.from('app_data').upsert([{ id: 1, content: db }]);
        if(!error) {
            s.style.background = '#10b981'; s.innerText = '✅ Sincronizado';
            setTimeout(() => s.style.display = 'none', 1500);
        } else {
            s.style.background = '#ef4444'; s.innerText = '❌ Error de Conexión';
            console.error(error);
        }
    }

    function renderLogin() {
        document.getElementById('app').innerHTML = `
            <div style="height:100vh; display:flex; align-items:center; justify-content:center">
                <div class="card" style="width:350px">
                    <h2 style="text-align:center">Gestión estudiantil</h2>
                    <select id="role" onchange="uiL()" style="width:100%; margin-bottom:10px">
                        <option value="student">Estudiante</option>
                        <option value="admin">Administrador</option>
                    </select>
                    <div id="lBox"></div>
                    <button class="btn btn-primary" onclick="doLogin()" style="width:100%; margin-top:10px">Entrar</button>
                </div>
            </div>`;
        uiL();
    }

    function uiL() {
        const r = document.getElementById('role').value;
        const box = document.getElementById('lBox');
        box.innerHTML = r === 'admin' ?
            `<input type="text" id="u" placeholder="Usuario" style="width:100%">
             <input type="password" id="p" placeholder="Contraseña" style="width:100%; margin-top:10px">` :
            `<select id="c" style="width:100%">
                <option value="analisis">Análisis</option><option value="diseno">Diseño</option><option value="implementacion">Implementación</option>
             </select>
             <input type="text" id="ced" placeholder="Cédula" style="width:100%; margin-top:10px">
             <input type="text" id="cod" placeholder="Código de Clase" style="width:100%; margin-top:10px">`;
    }

    function doLogin() {
        const r = document.getElementById('role').value;
        if(r === 'admin') {
            if(document.getElementById('u').value === db.admin.user && document.getElementById('p').value === db.admin.pass) {
                session.role = 'admin'; renderAdmin();
            } else alert("Clave incorrecta");
        } else {
            const c = document.getElementById('c').value, ced = document.getElementById('ced').value.trim(), cod = document.getElementById('cod').value.trim();
            const s = db.students[c].find(x => x.cedula === ced);
            if(s && cod === db.codes[c]) {
                session.role = 'student'; session.user = s; session.class = c; renderStudent();
            } else alert("Acceso Denegado: Verifique Cédula y Código");
        }
    }

    // --- PANEL ADMIN ---
    function renderAdmin() {
        const c = session.class;
        const filtered = db.students[c].filter(s => s.nombre.toLowerCase().includes(session.search.toLowerCase()) || s.cedula.includes(session.search));

        document.getElementById('app').innerHTML = `
            <div class="header">
                <div><b>DOCENTE:</b> UNEFA Maracay</div>
                <div>
                    <button class="btn btn-accent" onclick="changeAdmin()">Config. Acceso</button>
                    <button class="btn btn-danger" onclick="location.reload()">Salir</button>
                </div>
            </div>
            <div class="container">
                <div class="card" style="display:flex; gap:10px; align-items:center">
                    <b>Materia:</b>
                    <select onchange="session.class=this.value; renderAdmin()">
                        <option value="analisis" ${c==='analisis'?'selected':''}>Análisis</option>
                        <option value="diseno" ${c==='diseno'?'selected':''}>Diseño</option>
                        <option value="implementacion" ${c==='implementacion'?'selected':''}>Implementación</option>
                    </select>
                    <b>Código:</b> <input type="text" value="${db.codes[c]}" onchange="db.codes['${c}']=this.value; save()" style="width:100px">
                    <input type="text" placeholder="Buscar alumno..." style="flex-grow:1" oninput="session.search=this.value; renderAdmin()">
                    <button class="btn btn-primary" onclick="exportX('${c}')">Exportar Excel</button>
                </div>

                <div class="card">
                    <h3>📢 Tablón de Anuncios</h3>
                    <div style="display:flex; gap:10px">
                        <input type="text" id="at" placeholder="Título" style="flex-grow:1">
                        <input type="text" id="ab" placeholder="Mensaje..." style="flex-grow:2">
                        <button class="btn btn-accent" onclick="postAnn('${c}')">Publicar</button>
                    </div>
                </div>

                <div class="card">
                    <h3>Estudiantes y Calificaciones (Editable)</h3>
                    <div class="table-wrap">
                        <table>
                            <thead>
                                <tr><th>Cédula</th><th>Nombre</th><th>Apellido</th>${TASKS.map(t=>`<th>${t}</th>`).join('')}<th>Eliminar</th></tr>
                            </thead>
                            <tbody>
                                ${filtered.map(s => `
                                    <tr>
                                        <td><b>${s.cedula}</b></td>
                                        <td><input class="edit-input" value="${s.nombre}" onchange="updateS('${c}','${s.cedula}','nombre',this.value)"></td>
                                        <td><input class="edit-input" value="${s.apellido}" onchange="updateS('${c}','${s.cedula}','apellido',this.value)"></td>
                                        ${TASKS.map(t => `
                                            <td><input type="number" class="nota-input" style="width:50px" value="${db.grades[c][s.cedula]?.[t] || ''}"
                                                onchange="updateG('${c}','${s.cedula}','${t}',this.value)"></td>
                                        `).join('')}
                                        <td><button class="btn-danger" onclick="delS('${c}','${s.cedula}')">x</button></td>
                                    </tr>`).join('')}
                            </tbody>
                        </table>
                    </div>
                    <button class="btn btn-primary" style="margin-top:15px" onclick="addS('${c}')">+ Nuevo Estudiante</button>
                </div>

                <div class="card">
                    <h3>📂 Entregas Recibidas</h3>
                    <div class="table-wrap">
                        <table>
                            <thead><tr><th>Estudiante</th><th>Archivo</th><th>Fecha</th></tr></thead>
                            <tbody>
                                ${Object.keys(db.uploads[c]).map(ced => db.uploads[c][ced].map(u => `
                                    <tr><td>${ced}</td><td><a href="${u.data}" download="${u.name}">${u.name}</a></td><td>${u.date}</td></tr>
                                `).join('')).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>`;
    }

    // --- PANEL ESTUDIANTE ---
    function renderStudent() {
        const { user: s, class: c } = session;
        document.getElementById('app').innerHTML = `
            <div class="header"><div>ESTUDIANTE: ${s.nombre} ${s.apellido}</div><button class="btn btn-danger" onclick="location.reload()">Salir</button></div>
            <div class="container">
                <div class="card">
                    <h3>📢 Tablón de Anuncios</h3>
                    ${db.announcements[c].length ? db.announcements[c].map(a=>`<div style="padding:10px; border-bottom:1px solid #eee"><b>${a.t}</b>: ${a.b} <br><small>${a.d}</small></div>`).reverse().join('') : 'Sin anuncios.'}
                </div>
                <div class="card">
                    <h3>Mis Notas</h3>
                    <table style="width:100%">
                        ${TASKS.map(t => `<tr><td>${t}</td><td><b>${db.grades[c][s.cedula]?.[t] || 'Pendiente'}</b></td></tr>`).join('')}
                    </table>
                </div>
                <div class="card">
                    <h3>Subir Tarea / Trabajo</h3>
                    <input type="file" id="f">
                    <button class="btn btn-primary" onclick="upFile()">Enviar Archivo</button>
                </div>
            </div>`;
    }

    // --- LÓGICA ---
    async function updateS(c, ced, campo, val) {
        let st = db.students[c].find(x => x.cedula === ced);
        if(st) st[campo] = val;
        await save();
    }

    async function updateG(c, ced, tarea, val) {
        if(!db.grades[c][ced]) db.grades[c][ced] = {};
        db.grades[c][ced][tarea] = val;
        await save();
    }

    async function addS(c) {
        const ced = prompt("Cédula:"), n = prompt("Nombre:"), a = prompt("Apellido:");
        if(ced && n) {
            db.students[c].push({cedula:ced, nombre:n, apellido:a});
            if(!db.grades[c][ced]) db.grades[c][ced] = {};
            await save(); renderAdmin();
        }
    }

    async function postAnn(c) {
        const t = document.getElementById('at').value, b = document.getElementById('ab').value;
        if(t && b) {
            db.announcements[c].push({t, b, d: new Date().toLocaleString()});
            await save(); renderAdmin();
        }
    }

    async function upFile() {
        const file = document.getElementById('f').files[0];
        if(!file) return alert("Seleccione un archivo");
        const reader = new FileReader();
        reader.onload = async (e) => {
            const { user: s, class: c } = session;
            if(!db.uploads[c][s.cedula]) db.uploads[c][s.cedula] = [];
            db.uploads[c][s.cedula].push({ name: file.name, data: e.target.result, date: new Date().toLocaleString() });
            await save(); alert("Archivo enviado"); renderStudent();
        };
        reader.readAsDataURL(file);
    }

    function changeAdmin() {
        const u = prompt("Nuevo usuario admin:", db.admin.user);
        const p = prompt("Nueva contraseña admin:", db.admin.pass);
        if(u && p) { db.admin = {user:u, pass:p}; save(); alert("Acceso actualizado"); }
    }

    async function delS(c, ced) {
        if(confirm("¿Borrar estudiante y sus notas?")) {
            db.students[c] = db.students[c].filter(x => x.cedula !== ced);
            delete db.grades[c][ced];
            await save(); renderAdmin();
        }
    }

    function exportX(c) {
        const data = db.students[c].map(s => {
            let r = { "Cédula": s.cedula, "Estudiante": `${s.apellido}, ${s.nombre}` };
            TASKS.forEach(t => r[t] = db.grades[c][s.cedula]?.[t] || 0);
            return r;
        });
        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Notas");
        XLSX.writeFile(wb, `Reporte_${c}.xlsx`);
    }

    init();
</script>
</body>
</html>
