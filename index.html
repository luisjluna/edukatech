<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sincronización Educativa | Supabase</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #2c6e9e; --accent: #059669; --danger: #dc2626; --bg: #f1f5f9; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #1e293b; }
        .container { max-width: 1400px; margin: 0 auto; }

        /* Indicador de Sincronización */
        #sync-status { position: fixed; top: 20px; right: 20px; padding: 10px 20px; border-radius: 50px; font-size: 0.8rem; font-weight: bold; display: none; z-index: 1000; }
        .syncing { background: #fef3c7; color: #92400e; border: 1px solid #f59e0b; }
        .synced { background: #d1fae5; color: #065f46; border: 1px solid #10b981; }

        /* Estructura de Paneles */
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .table-container { overflow-x: auto; max-height: 600px; border: 1px solid #e2e8f0; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { background: #f8fafc; padding: 12px; text-align: left; border-bottom: 2px solid #e2e8f0; position: sticky; top: 0; }
        td { padding: 10px; border-bottom: 1px solid #f1f5f9; }

        /* UI de Notas */
        .input-nota { width: 50px; padding: 6px; border: 1px solid #cbd5e1; border-radius: 4px; text-align: center; font-weight: bold; }
        .input-nota:focus { outline: 2px solid var(--primary); border-color: transparent; }

        /* Login */
        .login-wrap { height: 80vh; display: flex; align-items: center; justify-content: center; }
        .btn { cursor: pointer; border: none; padding: 10px 18px; border-radius: 6px; font-weight: 600; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-danger { background: #fee2e2; color: var(--danger); }
        input, select { padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; margin: 5px 0; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="sync-status"></div>
<div id="app" class="container"></div>

<script>
    // 1. CONFIGURACIÓN SUPABASE
    const SUPABASE_URL = 'https://hofxrumwrvxylxikkcqf.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhvZnhydW13cnZ4eWx4aWtrY3FmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1NDQzNjAsImV4cCI6MjA5MjEyMDM2MH0.x1ep51ooqiBpw30H7ixpcM_UpphIeAszCZZRxzaCS-A';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let db = null;
    let session = { role: null, user: null, class: null };

    // 2. CARGA Y SINCRONIZACIÓN
    async function start() {
        const { data, error } = await _supabase.from('app_data').select('content').eq('id', 1).single();
        if (error || !data) {
            db = {
                adminAuth: { user: 'admin', pass: 'admin123' },
                classCodes: { analisis: 'ANA2025', diseno: 'DIS2025', implementacion: 'IMP2025' },
                students: { analisis: [], diseno: [], implementacion: [] },
                assignments: { analisis: [], diseno: [], implementacion: [] },
                grades: { analisis: {}, diseno: {}, implementacion: {} }
            };
            await _supabase.from('app_data').insert([{ id: 1, content: db }]);
        } else {
            db = data.content;
        }
        renderLogin();
    }

    async function syncDB() {
        const status = document.getElementById('sync-status');
        status.innerText = "⏳ Sincronizando...";
        status.className = "syncing";
        status.style.display = "block";

        const { error } = await _supabase.from('app_data').update({ content: db }).eq('id', 1);

        if (!error) {
            status.innerText = "✅ Guardado";
            status.className = "synced";
            setTimeout(() => status.style.display = "none", 2000);
        } else {
            alert("Error de conexión al guardar.");
        }
    }

    // 3. VISTAS
    function renderLogin() {
        document.getElementById('app').innerHTML = `
            <div class="login-wrap">
                <div class="card" style="width: 350px; text-align:center;">
                    <h2>Aula Virtual</h2>
                    <select id="role" onchange="toggleFields()">
                        <option value="admin">Administrador</option>
                        <option value="student">Estudiante</option>
                    </select>
                    <div id="fields">
                        <input type="text" id="u" placeholder="Usuario">
                        <input type="password" id="p" placeholder="Contraseña">
                    </div>
                    <button class="btn btn-primary" style="width:100%; margin-top:10px;" onclick="handleLogin()">Ingresar</button>
                </div>
            </div>`;
    }

    function toggleFields() {
        const r = document.getElementById('role').value;
        const f = document.getElementById('fields');
        f.innerHTML = r === 'admin' ?
            `<input type="text" id="u" placeholder="Usuario"><input type="password" id="p" placeholder="Contraseña">` :
            `<select id="c">${Object.keys(db.classCodes).map(k => `<option value="${k}">${k.toUpperCase()}</option>`).join('')}</select>
             <input type="text" id="ced" placeholder="Cédula">
             <input type="password" id="cod" placeholder="Código de Acceso">`;
    }

    function handleLogin() {
        const role = document.getElementById('role').value;
        if(role === 'admin') {
            const u = document.getElementById('u').value;
            const p = document.getElementById('p').value;
            if(u === db.adminAuth.user && p === db.adminAuth.pass) { session.role = 'admin'; renderAdmin(); }
            else alert("Acceso denegado");
        } else {
            const c = document.getElementById('c').value;
            const ced = document.getElementById('ced').value;
            const cod = document.getElementById('cod').value;
            const student = db.students[c].find(s => s.cedula === ced);
            if(student && cod === db.classCodes[c]) {
                session = { role: 'student', user: student, class: c };
                renderStudent();
            } else alert("Cédula o Código incorrecto");
        }
    }

    // 4. PANEL ADMINISTRADOR (NOTAS Y ESTUDIANTES)
    function renderAdmin() {
        document.getElementById('app').innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h1>Gestión Académica</h1>
                <div>
                    <button class="btn btn-primary" onclick="changePass()">🔑 Clave</button>
                    <button class="btn btn-danger" onclick="location.reload()">Cerrar Sesión</button>
                </div>
            </div>
            <div class="card">
                <label>Seleccionar Materia:</label>
                <select id="cur" style="width:200px" onchange="renderAdmin()">
                    ${Object.keys(db.students).map(k => `<option value="${k}" ${session.view === k ? 'selected' : ''}>${k.toUpperCase()}</option>`).join('')}
                </select>
                <div class="table-container" style="margin-top:20px;">
                    <table id="mainTable"></table>
                </div>
                <div style="margin-top:20px;">
                    <button class="btn btn-primary" onclick="addEst()">+ Estudiante</button>
                    <button class="btn btn-primary" onclick="addT()">+ Tarea</button>
                </div>
            </div>`;

        const c = document.getElementById('cur').value;
        session.view = c;
        const table = document.getElementById('mainTable');
        const tasks = db.assignments[c];
        const students = db.students[c];

        // Header
        let h = `<thead><tr><th>Cédula</th><th>Estudiante</th>`;
        tasks.forEach(t => h += `<th>${t.name} <button class="btn-danger" style="padding:1px 5px; font-size:10px;" onclick="delT('${c}',${t.id})">x</button></th>`);
        h += `<th>Acciones</th></tr></thead><tbody>`;

        // Filas
        students.forEach(s => {
            h += `<tr><td><b>${s.cedula}</b></td><td>${s.nombre} ${s.apellido}</td>`;
            tasks.forEach(t => {
                const n = db.grades[c][s.cedula]?.[t.id] || '';
                h += `<td><input type="number" class="input-nota" value="${n}" onchange="upGrade('${c}','${s.cedula}','${t.id}',this.value)"></td>`;
            });
            h += `<td><button class="btn btn-danger btn-sm" onclick="delEst('${c}','${s.cedula}')">Borrar</button></td></tr>`;
        });
        table.innerHTML = h + `</tbody>`;
    }

    // 5. PANEL ESTUDIANTE
    function renderStudent() {
        const s = session.user;
        const c = session.class;
        document.getElementById('app').innerHTML = `
            <div class="card">
                <h2>Portal de Notas</h2>
                <p>Estudiante: <b>${s.nombre} ${s.apellido}</b> | Cédula: <b>${s.cedula}</b></p>
                <hr>
                <table>
                    <thead><tr><th>Evaluación</th><th>Calificación</th></tr></thead>
                    <tbody>
                        ${db.assignments[c].map(t => `
                            <tr>
                                <td>${t.name}</td>
                                <td style="font-size:1.2rem; font-weight:bold; color:var(--primary)">
                                    ${db.grades[c][s.cedula]?.[t.id] || 'Pnd.'}
                                </td>
                            </tr>`).join('')}
                    </tbody>
                </table>
                <button class="btn btn-danger" style="margin-top:20px;" onclick="location.reload()">Salir</button>
            </div>`;
    }

    // 6. FUNCIONES DE BASE DE DATOS
    async function upGrade(c, ced, tid, val) {
        if(!db.grades[c][ced]) db.grades[c][ced] = {};
        db.grades[c][ced][tid] = val;
        await syncDB();
    }

    async function addEst() {
        const c = session.view;
        const ced = prompt("Cédula:");
        const nom = prompt("Nombre:");
        const ape = prompt("Apellido:");
        if(ced && nom) {
            db.students[c].push({cedula: ced, nombre: nom, apellido: ape});
            await syncDB(); renderAdmin();
        }
    }

    async function addT() {
        const c = session.view;
        const n = prompt("Nombre de la nueva tarea:");
        if(n) {
            db.assignments[c].push({id: Date.now(), name: n});
            await syncDB(); renderAdmin();
        }
    }

    async function delEst(c, ced) {
        if(confirm("¿Eliminar estudiante?")) {
            db.students[c] = db.students[c].filter(x => x.cedula !== ced);
            delete db.grades[c][ced];
            await syncDB(); renderAdmin();
        }
    }

    async function delT(c, id) {
        if(confirm("¿Eliminar tarea y todas sus notas?")) {
            db.assignments[c] = db.assignments[c].filter(x => x.id !== id);
            await syncDB(); renderAdmin();
        }
    }

    async function changePass() {
        const p = prompt("Nueva clave admin:");
        if(p) { db.adminAuth.pass = p; await syncDB(); alert("Clave actualizada"); }
    }

    start();
</script>
</body>
</html>
